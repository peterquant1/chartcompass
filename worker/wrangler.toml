name = "chartcompass-pay"
main = "src/index.js"
compatibility_date = "2026-07-01"

[vars]
# 站点地址（成功页跳转 + CORS 白名单用）
# 2026-07-21：gouzhuang748.com 被用户收回给另一个项目用，站点暂时改回 GitHub Pages 默认域名，等新域名（Vectrend）买好再切换。
SITE_URL = "https://peterquant1.github.io/chartcompass"
ALLOWED_ORIGINS = "https://peterquant1.github.io,http://localhost:4173"
PRICE_AMOUNT = "99"
PRICE_CURRENCY = "USDT"
# 发票有效期（分钟，15-2880）
INVOICE_LIFETIME = "60"
# 金额下限：webhook 收到"已付"后，发票金额低于此值一律挂起待人工（勿自动交付）。
# 独立于 PRICE_AMOUNT，专门拦截"误留 PRICE_AMOUNT=1 测试值"这类配置漂移。
# 2026-07-21 定价从 1500 降到 99 时同步下调（原 500 保持约 1/3 比例）。
MIN_PAID_AMOUNT = "50"

# 部署前运行: npx wrangler kv namespace create ORDERS
# 然后把返回的 id 填到这里
[[kv_namespaces]]
binding = "ORDERS"
id = "cf4d1ff7f9e14ab1a19fbbc36795b57f"

# 机密（不要写进本文件，用命令行设置）:
#   npx wrangler secret put OXAPAY_MERCHANT_API_KEY   （必填，OxaPay 商户 API Key）
#   npx wrangler secret put TELEGRAM_BOT_TOKEN        （可选，收款/交付通知）
#   npx wrangler secret put TELEGRAM_CHAT_ID          （可选，你的 TG chat id）
